# Polybot configuration. Every value here overrides the defaults in
# polybot/config.py; delete a line to fall back to the default.

strategy:
  move_lookback_secs: 90      # window for detecting a sharp move
  move_threshold: 0.08        # min |price change| over the window (8 cents)
  min_edge: 0.05              # model must disagree with the move by >= this
  home_fair_shrink: 0.05      # bias fix: model overrates home teams ~5-9 pts in
                              # mid-range (backtest calibrate); replay P&L best here
  max_quote_age_secs: 30      # no entries on a BBO staler than this
  early_game_max_inning: 5    # early innings are noisier; trade only strong setups
  early_game_min_edge: 0.10
  early_game_min_fair_extreme: 0.70
  min_price: 0.10             # never buy tokens priced below
  max_price: 0.85             # or above
  max_spread: 0.06            # skip entries if best ask - best bid is wider
  strong_stake_max_spread: 0.03
  take_profit: 0.12           # +12% -> close (your 5-30% band; tune here)
  stop_loss: 0.30             # -30% -> close (high risk: give reversion room)
  max_hold_secs: 900          # 15 min time stop
  edge_exit: 0.03             # close if model edge flips against us
  cooldown_secs: 120          # per-market cooldown between trades
  stop_loss_cooldown_secs: 900 # no fast re-entry after getting stopped
  min_flips: 2                # "playful game" filter: 0.5-crossings needed...
  flip_band: 0.03             #   ...beyond this band around 0.5
  min_volatility: 0.015       # OR realized vol >= this
  vol_window: 30
  sampling_stable_features: false # v1 controls retain legacy sample windows
  feature_window_secs: 90       # Phase 3 fixed receipt-time feature window
  feature_bucket_secs: 5
  flip_window_secs: 600
  signal_episode_secs: 120    # collapse a continuously-firing signal into ONE
                              # logged episode; a new one starts only after the
                              # condition goes quiet this long (avoids dependent
                              # duplicate rows in signals/counterfactuals)
  residual_beta: 1.0          # transfer this fraction of model log-odds changes
  residual_threshold: 0.06    # market must miss anchored fair by at least 6c
  residual_min_model_delta: 0.02 # ignore state updates with <2pt model impact
  residual_response_secs: 45  # short state-reaction window for residual strategy
  residual_anchor_lookback_secs: 30 # anchor to the price this long BEFORE state
                              # receipt: the market moves on a play seconds before
                              # the MLB feed reports it, so the last pre-receipt
                              # price usually already prices the event
  market_anchor_max_age_secs: 21600 # frozen pregame anchor valid through a game

risk:
  stake_usd: 5                # base notional per trade
  strong_stake_usd: 10        # only for high-edge, tight-spread setups
  strong_stake_min_edge: 0.12
  max_positions: 3            # concurrent positions per strategy
  max_stake_per_market: 20
  daily_loss_limit_usd: 25    # halt new entries past this realized loss
  starting_cash: 100          # paper account per strategy

ai:
  enabled: true               # auto-disabled if ANTHROPIC_API_KEY is missing
  model: claude-opus-4-8
  effort: low                 # judge should be fast; raise to medium/high to test
  min_confidence: 0.55
  timeout_secs: 20

# Frozen-strategy registry. Each entry gets its own independent shadow portfolio
# and competes on the same market/game stream. `overrides` patch the `strategy:`
# block above. `kind: ai_shadow` judges a base strategy's candidates
# asynchronously (skipped when ai.enabled is false). Delete this block to fall
# back to the built-in frozen controls + Phase 3 variants + ai_shadow.
strategies:
  - name: fade_v1_frozen       # RETIRED (cash < min stake, see retired_strategies below);
    kind: fade                 # kept defined only because ai_shadow uses it as `base`
  - name: fade_tight           # cheap config-only variant: stricter move/edge
    kind: fade
    overrides:
      move_threshold: 0.15
      min_edge: 0.09
  - name: state_residual_v1    # fade market overreaction to a received state change
    kind: state_residual
  - name: market_anchor_v1     # team-strength-aware fair from frozen pregame market
    kind: market_anchored
  - name: ai_shadow            # async Claude gate over fade_v1_frozen candidates
    kind: ai_shadow
    base: fade_v1_frozen

  # ------------------------------------------------------------------------
  # Phase 5 hypothesis fleet: 25 genuinely different mechanisms (30 total
  # deterministic with the 5 controls above). Replay P&L on the ~32 recorded
  # games is a LIVENESS check only — selection happens exclusively through
  # the preregistered walk-forward gate with the multiplicity correction.
  #
  # Common override notes:
  #   min_edge: -1.0                 disables the model-edge execution gate for
  #                                  mechanisms whose claim is not model-based
  #   take_profit/stop_loss: 10.0,   inert exits: hold to settlement (check_exit
  #   max_hold_secs: 1e9,            always closes on game final first)
  #   edge_exit: 10.0
  # ------------------------------------------------------------------------

  # -- momentum: in-game moves are information (refuted-fade inverted) --
  - name: momentum_fast_v1
    kind: momentum
    hypothesis: "90s information moves continue rather than revert"
    overrides: {min_edge: -1.0}
  - name: momentum_slow_v1
    kind: momentum
    hypothesis: "slower info diffuses over minutes; ride 5-min moves longer"
    overrides: {min_edge: -1.0, move_lookback_secs: 300, move_threshold: 0.12,
                max_hold_secs: 1800}
  - name: momentum_confirmed_v1
    kind: momentum
    hypothesis: "move + model agreeing on direction = real news, continuation"
    overrides: {min_edge: -1.0, momentum_require_model_agree: true}
  - name: momentum_orderflow_v1
    kind: momentum
    hypothesis: "moves with NO recent state change = informed flow ahead of the feed"
    overrides: {min_edge: -1.0, momentum_min_state_age_secs: 120}

  # -- event_reaction: with-the-news underreaction to a fresh state change --
  - name: news_underreact_v1
    kind: event_reaction
    hypothesis: "market underreacts to state changes in the first 30s"
    overrides: {min_edge: -1.0}
  - name: news_underreact_score_v1
    kind: event_reaction
    hypothesis: "scoring plays specifically are underpriced at receipt"
    overrides: {min_edge: -1.0, event_class: score_change, event_min_model_delta: 0.06}
  - name: news_underreact_bases_v1
    kind: event_reaction
    hypothesis: "subtle base/out events are the least attended, most underpriced"
    overrides: {min_edge: -1.0, event_class: bases_or_outs, event_min_model_delta: 0.03}
  - name: news_late_v1
    kind: event_reaction
    hypothesis: "late-inning high-leverage events lag the most"
    overrides: {min_edge: -1.0, event_min_inning: 7, event_min_model_delta: 0.05}

  # -- extreme_hold: fee is theta*p*(1-p); cost collapses at the tails --
  - name: favorite_late_v1
    kind: extreme_hold
    hypothesis: "late favorites >=0.90 are underpriced; near-zero fee zone"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: favorite_mid_v1
    kind: extreme_hold
    hypothesis: "mid-game favorites 0.85-0.95 keep drifting up"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.85, extreme_max_price: 0.95,
                extreme_min_inning: 4, extreme_max_inning: 6,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: favorite_model_agree_v1
    kind: extreme_hold
    hypothesis: "model-confirmed favorites only; agreement filters dead cats"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.88, extreme_min_inning: 1,
                extreme_require_model_agree: true, extreme_model_agree_margin: 0.02,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: longshot_value_v1
    kind: extreme_hold
    hypothesis: "longshots with model support are underpriced (bias direction A)"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.03, extreme_max_price: 0.10,
                extreme_min_inning: 1,
                extreme_require_model_agree: true, extreme_model_agree_margin: 0.05,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: anti_longshot_v1
    kind: extreme_hold
    hypothesis: "favorite-longshot bias: longshots overpriced, their complement cheap"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_inning: 1,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- settlement_hold: model-market gap held to settlement (one fee leg) --
  - name: settle_gap10_v1
    kind: settlement_hold
    hypothesis: "the locked 2026-07-12 prereg rule as a forward paper test"
    overrides: {take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_gap05_early_v1
    kind: settlement_hold
    hypothesis: "market is slow to price game state in innings 1-3"
    overrides: {hold_min_edge: 0.05, hold_max_inning: 3,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_anchored_v1
    kind: settlement_hold
    hypothesis: "team-strength-corrected disagreement via the frozen pregame anchor"
    overrides: {hold_fair_source: market_anchored, hold_min_edge: 0.08,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_away_v1
    kind: settlement_hold
    hypothesis: "model overrates homes ~5-9pts, so away-side gaps are trustworthy"
    overrides: {hold_side_filter: away, hold_min_edge: 0.08,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- calibration_cell: model-free bias harvesting, hold to settlement --
  - name: cell_home_dog_v1
    kind: calibration_cell
    hypothesis: "home underdogs 0.30-0.45 are systematically underpriced"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: home, cell_price_min: 0.30, cell_price_max: 0.45,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_away_fav_late_v1
    kind: calibration_cell
    hypothesis: "away favorites finish; crowd overweights late home comebacks"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: away, cell_price_min: 0.75, cell_price_max: 0.90,
                cell_inning_min: 7,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_leader_coinflip_v1
    kind: calibration_cell
    hypothesis: "market is slow to credit actual leads still priced near a coin flip"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: leader, cell_price_min: 0.50, cell_price_max: 0.62,
                cell_inning_min: 4,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_trailer_cheap_v1
    kind: calibration_cell
    hypothesis: "early comebacks are underpriced at 0.15-0.25"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: trailer, cell_price_min: 0.15, cell_price_max: 0.25,
                cell_inning_max: 5,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_extras_home_v1
    kind: calibration_cell
    hypothesis: "last-at-bat advantage in extra innings is underpriced"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: home, cell_price_min: 0.40, cell_price_max: 0.65,
                cell_inning_min: 10,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- microstructure: book-shape and timing mechanisms --
  - name: spread_shock_v1
    kind: microstructure
    hypothesis: "a spread shock that re-tightens reveals the informed side"
    overrides: {min_edge: -1.0, micro_mode: spread_snap, micro_min_reprice: 0.02}
  - name: stale_reprice_v1
    kind: microstructure
    hypothesis: "the reprice after a one-sided book gap carries the outage's news"
    overrides: {min_edge: -1.0, micro_mode: stale_reprice}
  - name: pregame_drift_v1
    kind: microstructure
    hypothesis: "late pregame money is informed (lineups/pitchers); ride it early"
    overrides: {min_edge: -1.0, micro_mode: pregame_drift, max_hold_secs: 5400}

  # ========================================================================
  # v2 retune fleet (2026-07-17). v1 entries above stay FROZEN so their
  # preregistered track record is preserved; these v2s apply the
  # frequency-based rule from the observed funnel over the ~17-20 recorded
  # live games (fade controls entered 15-20 markets each; every v1 above
  # entered only ONE). Rule:
  #   * mechanisms structurally capable of many trades but starved by an
  #     over-tight entry gate  -> LOOSEN entry (more trades, small-% exit kept)
  #   * mechanisms that are rare by design (late-only, no-recent-state,
  #     book-shape events)      -> keep them rare but go for BIGGER % per trade
  #   * hold-to-settlement cells (already big-%) -> WIDEN the price/inning
  #     cell just enough to trade a handful of games (walk-forward liveness)
  #   * dead triggers (0 trades) -> fix the trigger that never fired
  # Each v2's `note` records the dominant v1 reject reason it targets.
  # ========================================================================

  # -- momentum: high-capacity (thousands of small_move rejects) -> more trades --
  - name: momentum_fast_v2
    kind: momentum
    version: v2
    note: "v1 208 signals but small_move=3625; lower move gate for more trades"
    overrides: {min_edge: -1.0, move_threshold: 0.05}
  - name: momentum_slow_v2
    kind: momentum
    version: v2
    note: "v1 small_move=3468 at move_threshold 0.12; loosen to 0.08"
    overrides: {min_edge: -1.0, move_lookback_secs: 300, move_threshold: 0.08,
                max_hold_secs: 1800}
  - name: momentum_confirmed_v2
    kind: momentum
    version: v2
    note: "v1 small_move + model_disagrees; loosen move, keep model-agree filter"
    overrides: {min_edge: -1.0, move_threshold: 0.05, momentum_require_model_agree: true}
  - name: momentum_orderflow_v2
    kind: momentum
    version: v2
    note: "rare by design (no recent state); keep gate, ride bigger % per trade"
    overrides: {min_edge: -1.0, momentum_min_state_age_secs: 90,
                take_profit: 0.30, stop_loss: 0.30, max_hold_secs: 3600}

  # -- event_reaction: loosen model-delta / underreaction gates -> more trades --
  - name: news_underreact_v2
    kind: event_reaction
    version: v2
    note: "v1 small_model_move=815 + no_underreaction; lower both thresholds"
    overrides: {min_edge: -1.0, event_min_model_delta: 0.02,
                event_min_underreaction: 0.01, event_max_age_secs: 45}
  - name: news_underreact_score_v2
    kind: event_reaction
    version: v2
    note: "v1 took 0 trades (delta 0.06 too high for score plays); loosen + widen age"
    overrides: {min_edge: -1.0, event_class: score_change, event_min_model_delta: 0.03,
                event_min_underreaction: 0.01, event_max_age_secs: 60}
  - name: news_underreact_bases_v2
    kind: event_reaction
    version: v2
    note: "v1 small_model_move=596; base/out impacts are tiny, drop delta to 0.015"
    overrides: {min_edge: -1.0, event_class: bases_or_outs, event_min_model_delta: 0.015,
                event_min_underreaction: 0.01}
  - name: news_late_v2
    kind: event_reaction
    version: v2
    note: "rare by design (inning>=7); hold the high-leverage underreaction to settlement"
    overrides: {min_edge: -1.0, event_min_inning: 7, event_min_model_delta: 0.03,
                event_min_underreaction: 0.01,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- extreme_hold: already big-% (hold to settlement); widen band for liveness --
  - name: favorite_late_v2
    kind: extreme_hold
    version: v2
    note: "v1 1 trade, outside_price_band=576; widen [0.85,0.99], inning>=6"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.85, extreme_max_price: 0.99, extreme_min_inning: 6,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: favorite_mid_v2
    kind: extreme_hold
    version: v2
    note: "v1 took 0 trades (outside_price_band=1820); widen band + inning window"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.80, extreme_max_price: 0.97,
                extreme_min_inning: 3, extreme_max_inning: 7,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: favorite_model_agree_v2
    kind: extreme_hold
    version: v2
    note: "v1 971 signals but 1 trade; lower price floor + agree margin for more games"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.82, extreme_min_inning: 1,
                extreme_require_model_agree: true, extreme_model_agree_margin: 0.01,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: longshot_value_v2
    kind: extreme_hold
    version: v2
    note: "v1 took 0 (model rarely backs a longshot by +5pts); widen band, ease margin"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.03, extreme_max_price: 0.15, extreme_min_inning: 1,
                extreme_require_model_agree: true, extreme_model_agree_margin: 0.02,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: anti_longshot_v2
    kind: extreme_hold
    version: v2
    note: "v1 1 trade, outside_price_band=3002; widen [0.85,0.99]"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                extreme_min_price: 0.85, extreme_max_price: 0.99, extreme_min_inning: 1,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- settlement_hold: big-%; lower gap + widen innings + ease exec gate -> more --
  - name: settle_gap10_v2
    kind: settlement_hold
    version: v2
    note: "v1 small_gap=1627 + late_inning=1511; gap 0.06, innings <=8"
    overrides: {min_edge: 0.02, hold_min_edge: 0.06, hold_max_inning: 8,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_gap05_early_v2
    kind: settlement_hold
    version: v2
    note: "v1 late_inning=3331 + execution_cost=233; innings <=5, gap 0.04, ease exec"
    overrides: {min_edge: 0.02, hold_min_edge: 0.04, hold_max_inning: 5,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_anchored_v2
    kind: settlement_hold
    version: v2
    note: "v1 small_gap=2247; anchored gap 0.05, innings <=8"
    overrides: {min_edge: 0.02, hold_fair_source: market_anchored, hold_min_edge: 0.05,
                hold_max_inning: 8,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: settle_away_v2
    kind: settlement_hold
    version: v2
    note: "v1 1243 signals but 1 trade; away gap 0.05, innings <=8"
    overrides: {min_edge: 0.02, hold_side_filter: away, hold_min_edge: 0.05,
                hold_max_inning: 8,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- calibration_cell: big-%; widen the price/inning cell for liveness --
  - name: cell_home_dog_v2
    kind: calibration_cell
    version: v2
    note: "v1 outside_cell_price=2210; widen home band to [0.25,0.48]"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: home, cell_price_min: 0.25, cell_price_max: 0.48,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_away_fav_late_v2
    kind: calibration_cell
    version: v2
    note: "v1 outside_cell_price=1111; widen [0.68,0.95], inning>=6"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: away, cell_price_min: 0.68, cell_price_max: 0.95,
                cell_inning_min: 6,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_leader_coinflip_v2
    kind: calibration_cell
    version: v2
    note: "v1 1161 signals but 1 trade; widen leader band [0.48,0.68], inning>=3"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: leader, cell_price_min: 0.48, cell_price_max: 0.68,
                cell_inning_min: 3,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_trailer_cheap_v2
    kind: calibration_cell
    version: v2
    note: "v1 outside_cell_price=1562; widen trailer band [0.12,0.32], inning<=6"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: trailer, cell_price_min: 0.12, cell_price_max: 0.32,
                cell_inning_max: 6,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}
  - name: cell_extras_home_v2
    kind: calibration_cell
    version: v2
    note: "v1 took 0 (no extra-inning games); relax to last-at-bat 9th+ home edge"
    overrides: {min_edge: -1.0, min_price: 0.01, max_price: 0.99,
                cell_side: home, cell_price_min: 0.40, cell_price_max: 0.65,
                cell_inning_min: 9,
                take_profit: 10.0, stop_loss: 10.0, max_hold_secs: 1000000000,
                edge_exit: 10.0}

  # -- microstructure: fix the dead triggers; loosen the shock detector --
  - name: spread_shock_v2
    kind: microstructure
    version: v2
    note: "v1 no_spread_shock=3298; lower shock/reprice, widen window -> more trades"
    overrides: {min_edge: -1.0, micro_mode: spread_snap, micro_spread_shock: 0.02,
                micro_min_reprice: 0.015, micro_window_secs: 90}
  - name: stale_reprice_v2
    kind: microstructure
    version: v2
