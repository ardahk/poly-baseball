# Polybot configuration. Every value here overrides the defaults in
# polybot/config.py; delete a line to fall back to the default.

strategy:
  move_lookback_secs: 90      # window for detecting a sharp move
  move_threshold: 0.08        # min |price change| over the window (8 cents)
  min_edge: 0.05              # model must disagree with the move by >= this
  home_fair_shrink: 0.05      # bias fix: model overrates home teams ~5-9 pts in
                              # mid-range (backtest calibrate); replay P&L best here
  max_quote_age_secs: 30      # no entries on a BBO staler than this
  early_game_max_inning: 5    # early innings are noisier; trade only strong setups
  early_game_min_edge: 0.10
  early_game_min_fair_extreme: 0.70
  min_price: 0.10             # never buy tokens priced below
  max_price: 0.85             # or above
  max_spread: 0.06            # skip entries if best ask - best bid is wider
  strong_stake_max_spread: 0.03
  take_profit: 0.12           # +12% -> close (your 5-30% band; tune here)
  stop_loss: 0.30             # -30% -> close (high risk: give reversion room)
  max_hold_secs: 900          # 15 min time stop
  edge_exit: 0.03             # close if model edge flips against us
  cooldown_secs: 120          # per-market cooldown between trades
  stop_loss_cooldown_secs: 900 # no fast re-entry after getting stopped
  min_flips: 2                # "playful game" filter: 0.5-crossings needed...
  flip_band: 0.03             #   ...beyond this band around 0.5
  min_volatility: 0.015       # OR realized vol >= this
  vol_window: 30
  sampling_stable_features: false # v1 controls retain legacy sample windows
  feature_window_secs: 90       # Phase 3 fixed receipt-time feature window
  feature_bucket_secs: 5
  flip_window_secs: 600
  signal_episode_secs: 120    # collapse a continuously-firing signal into ONE
                              # logged episode; a new one starts only after the
                              # condition goes quiet this long (avoids dependent
                              # duplicate rows in signals/counterfactuals)
  residual_beta: 1.0          # transfer this fraction of model log-odds changes
  residual_threshold: 0.06    # market must miss anchored fair by at least 6c
  residual_min_model_delta: 0.02 # ignore state updates with <2pt model impact
  residual_response_secs: 45  # short state-reaction window for residual strategy
  market_anchor_max_age_secs: 21600 # frozen pregame anchor valid through a game

risk:
  stake_usd: 5                # base notional per trade
  strong_stake_usd: 10        # only for high-edge, tight-spread setups
  strong_stake_min_edge: 0.12
  max_positions: 3            # concurrent positions per strategy
  max_stake_per_market: 20
  daily_loss_limit_usd: 25    # halt new entries past this realized loss
  starting_cash: 100          # paper account per strategy

ai:
  enabled: true               # auto-disabled if ANTHROPIC_API_KEY is missing
  model: claude-opus-4-8
  effort: low                 # judge should be fast; raise to medium/high to test
  min_confidence: 0.55
  timeout_secs: 20

# Frozen-strategy registry. Each entry gets its own independent shadow portfolio
# and competes on the same market/game stream. `overrides` patch the `strategy:`
# block above. `kind: ai_shadow` judges a base strategy's candidates
# asynchronously (skipped when ai.enabled is false). Delete this block to fall
# back to the built-in frozen controls + Phase 3 variants + ai_shadow.
strategies:
  - name: fade_v1_frozen       # the control: today's strategy config, unchanged
    kind: fade
  - name: fade_tight           # cheap config-only variant: stricter move/edge
    kind: fade
    overrides:
      move_threshold: 0.15
      min_edge: 0.09
  - name: liquidity_fade_v2    # unchanged-book shock control; time-stable features
    kind: fade
    overrides:
      sampling_stable_features: true
  - name: state_residual_v1    # fade market overreaction to a received state change
    kind: state_residual
  - name: market_anchor_v1     # team-strength-aware fair from frozen pregame market
    kind: market_anchored
  - name: ai_shadow            # async Claude gate over fade_v1_frozen candidates
    kind: ai_shadow
    base: fade_v1_frozen

engine:
  poll_interval_secs: 2
  game_state_interval_secs: 10
  pregame_game_state_window_secs: 1800 # only poll game state within 30 min of first pitch
  discovery_interval_secs: 1800
  equity_snapshot_secs: 60
  status_log_interval_secs: 300
  slippage: 0.0                 # runtime fills use executable BBO; legacy replay only
  paper_taker_fee_theta: 0.06   # Polymarket US taker fee coefficient
  causal_replay_latency_secs: 0.5 # first eligible BBO after decision + latency
  history_gap_reset_secs: 180     # reset rolling signals after an observation gap
  counterfactual_max_lag_secs: 5  # do not backfill old markout horizons after downtime
  state_model_path: null          # accepted research artifact; null keeps analytic control
  report_timezone: America/Los_Angeles # trading-day boundary, not the host timezone
  db_path: polybot.db
